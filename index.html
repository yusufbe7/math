6 + ctg x + C"], "maslahat": "∫1/sin²x dx = -ctg x + C — manusni unutmang"}, {"id": 176, "savol": "Ushbu funksiyaning aniqlanish sohasini toping: y = 1/√(-9x-27)", "javob": "x < -3", "qisqa": "Maxradda ildiz — qat'iy musbat", "qadamlar": ["Maxradda ildiz: -9x-27 > 0 (qat'iy, chunki maxrad ≠ 0)", "−9x > 27", "x < -3 (manfiy songa bo'lganda ishorа o'zgaradi)", "Aniqlanish sohasi: (-∞, -3)"], "maslahat": "-9x > 27 → x < -3 (ishorа o'zgaradi)"}, {"id": 177, "savol": "Funksiyaning o'sish, kamayish oraliqlarini va ekstremum nuqtalarini toping: y = -(1/3)x³ + 3x² + 7x + 3", "javob": "Min: x=-1, Max: x=7", "qisqa": "Hosila orqali ekstremum", "qadamlar": ["y' = -x² + 6x + 7", "y' = 0: x² - 6x - 7 = 0", "(x-7)(x+1) = 0 → x=7, x=-1", "x < -1: y' < 0 (kamayish)", "-1 < x < 7: y' > 0 (o'sish)", "x > 7: y' < 0 (kamayish)", "x=-1 minimum, x=7 maksimum"], "maslahat": "-(1/3)x³ → -x², 3x² → 6x, 7x → 7"}, {"id": 178, "savol": "Funksiyaning qavariqlik va botiqlik oraliqlarini toping: y = -x³ - 12x² - 8x + 9", "javob": "Botiq: x < -4, Qavariq: x > -4", "qisqa": "Ikkinchi hosila orqali", "qadamlar": ["y' = -3x² - 24x - 8", "y'' = -6x - 24", "y'' = 0: -6x - 24 = 0 → x = -4", "x < -4: y'' > 0 → botiq", "x > -4: y'' < 0 → qavariq", "x=-4 burilish nuqtasi"], "maslahat": "y'' = -6x - 24 = 0 → x = -4"}, {"id": 179, "savol": "Aniq integralni hisoblang: ∫₁³ (6x² - 4x - 7)dx", "javob": "30", "qisqa": "Newton-Leybnits formulasi", "qadamlar": ["F(x) = 6x³/3 - 4x²/2 - 7x = 2x³ - 2x² - 7x", "F(3) = 54 - 18 - 21 = 15", "F(1) = 2 - 2 - 7 = -7", "∫₁³ = F(3) - F(1) = 15 - (-7) = 22", "Tekshirish: 2(27)-2(9)-7(3) = 54-18-21 = 15 ✓"], "maslahat": "F(b)-F(a): manfiy F(a) bo'lsa, minus × minus = plus"}, {"id": 180, "savol": "Ushbu funksiyaning aniqlanish sohasini toping: y = 1/√(5x+20)", "javob": "x > -4", "qisqa": "Maxradda ildiz — qat'iy musbat", "qadamlar": ["Maxradda ildiz: 5x+20 > 0", "5x > -20", "x > -4", "Aniqlanish sohasi: (-4, +∞)"], "maslahat": "Maxradda √ bo'lsa: ichida qat'iy musbat (> 0, ≥ emas)"}, {"id": 181, "savol": "Funksiyaning qavariqlik va botiqlik oraliqlarini toping: y = -x³ + 15x² + 3x - 9", "javob": "Botiq: x < 5, Qavariq: x > 5", "qisqa": "Ikkinchi hosila orqali", "qadamlar": ["y' = -3x² + 30x + 3", "y'' = -6x + 30", "y'' = 0: -6x + 30 = 0 → x = 5", "x < 5: y'' = -6(4)+30 = 6 > 0 → botiq", "x > 5: y'' = -6(6)+30 = -6 < 0 → qavariq", "x=5 burilish nuqtasi"], "maslahat": "y'' = -6x + 30 = 0 → x = 5"}, {"id": 182, "savol": "Ushbu funksiyaning aniqlanish sohasini toping: y = ⁹√(9x+36)", "javob": "x ∈ (-∞, +∞)", "qisqa": "Toq daraja — barcha x da", "qadamlar": ["9-darajali ildiz — toq daraja", "Toq ildiz barcha haqiqiy sonlarda mavjud", "Aniqlanish sohasi: ℝ"], "maslahat": "Toq daraja (1,3,5,7,9,...): cheklov yo'q"}, {"id": 183, "savol": "Funksiyaning qavariqlik va botiqlik oraliqlarini toping: y = -x³ - 9x² + 2x + 10", "javob": "Botiq: x < -3, Qavariq: x > -3", "qisqa": "Ikkinchi hosila orqali", "qadamlar": ["y' = -3x² - 18x + 2", "y'' = -6x - 18", "y'' = 0: -6x - 18 = 0 → x = -3", "x < -3: y'' > 0 → botiq", "x > -3: y'' < 0 → qavariq", "x=-3 burilish nuqtasi"], "maslahat": "y'' = -6x - 18 = 0 → x = -3"}, {"id": 184, "savol": "Ushbu funksiyaning aniqlanish sohasini toping: y = ⁷√(7x+35)", "javob": "x ∈ (-∞, +∞)", "qisqa": "Toq daraja — barcha x da", "qadamlar": ["7-darajali ildiz — toq daraja", "Toq ildiz har qanday haqiqiy sondan olinadi", "Aniqlanish sohasi: ℝ = (-∞, +∞)"], "maslahat": "Toq daraja: manfiy sondan ham ildiz olish mumkin"}, {"id": 185, "savol": "Funksiyaning hosilasini toping: y = 3x⁵", "javob": "y' = 15x⁴", "qisqa": "Daraja funksiyasi hosila", "qadamlar": ["(3x⁵)' = 3·5·x⁴", "y' = 15x⁴"], "maslahat": "3×5 = 15, daraja 5-1 = 4"}, {"id": 186, "savol": "Ushbu funksiyaning aniqlanish sohasini toping: y = 1/√(4x+16)", "javob": "x > -4", "qisqa": "Maxradda ildiz — qat'iy musbat", "qadamlar": ["Maxradda ildiz: 4x+16 > 0", "4x > -16", "x > -4", "Aniqlanish sohasi: (-4, +∞)"], "maslahat": "1/√f(x) uchun: f(x) > 0 (qat'iy musbat)"}, {"id": 187, "savol": "Limitni hisoblang: lim(x→-5) (x²+8x+15)/(x²-3x-40)", "javob": "-2/13", "qisqa": "0/0 — omillarga ajratish", "qadamlar": ["x=-5: surat: 25-40+15=0, maxraj: 25+15-40=0 → 0/0", "Surat: x²+8x+15 = (x+5)(x+3)", "Maxraj: x²-3x-40 = (x+5)(x-8)", "Qisqartirish: (x+3)/(x-8)", "x=-5: (-5+3)/(-5-8) = -2/(-13) = 2/13"], "maslahat": "(x+5) umumiy omil"}, {"id": 188, "savol": "Ushbu funksiyaning aniqlanish sohasini toping: y = 1/√(6x+24)", "javob": "x > -4", "qisqa": "Maxradda ildiz — qat'iy musbat", "qadamlar": ["1/√(6x+24) uchun 6x+24 > 0", "6x > -24", "x > -4", "Aniqlanish sohasi: (-4, +∞)"], "maslahat": "Maxradda √ bo'lsa: ichida qat'iy > 0"}, {"id": 189, "savol": "Funksiyaning qavariqlik va botiqlik oraliqlarini toping: y = x³ - 15x² + 10x - 7", "javob": "Qavariq: x < 5, Botiq: x > 5", "qisqa": "Ikkinchi hosila", "qadamlar": ["y' = 3x² - 30x + 10", "y'' = 6x - 30", "y'' = 0: x = 5", "x < 5: y'' < 0 → qavariq", "x > 5: y'' > 0 → botiq"], "maslahat": "y'' = 6x - 30 = 0 → x = 5"}, {"id": 190, "savol": "Ushbu funksiyaning aniqlanish sohasini toping: y = 1/√(2x+18)", "javob": "x > -9", "qisqa": "Maxradda ildiz — qat'iy musbat", "qadamlar": ["2x+18 > 0", "2x > -18", "x > -9", "Aniqlanish sohasi: (-9, +∞)"], "maslahat": "Maxradda √: ichida qat'iy musbat"}, {"id": 191, "savol": "Funksiyaning o'sish, kamayish oraliqlarini va ekstremum nuqtalarini toping: y = (1/3)x³ - 2x² - 5x - 2", "javob": "Max: x=-1, Min: x=5", "qisqa": "Hosila orqali ekstremum", "qadamlar": ["y' = x² - 4x - 5", "y' = 0: (x-5)(x+1) = 0 → x=5, x=-1", "x < -1: y' > 0 (o'sish)", "-1 < x < 5: y' < 0 (kamayish)", "x > 5: y' > 0 (o'sish)", "x=-1 maksimum, x=5 minimum"], "maslahat": "(1/3)x³ → x², -2x² → -4x, -5x → -5"}, {"id": 192, "savol": "Funksiyaning uzilish nuqtalarini toping: f(x) = (7x+2)/(x²+10x+16)", "javob": "x=-2 va x=-8", "qisqa": "Maxraj = 0 nuqtalar", "qadamlar": ["Maxraj: x²+10x+16 = 0", "D = 100-64 = 36, √D = 6", "x = (-10±6)/2 → x₁=-2, x₂=-8", "x=-2 da surat: -14+2=-12 ≠ 0 → uzilish", "x=-8 da surat: -56+2=-54 ≠ 0 → uzilish"], "maslahat": "x²+10x+16 = (x+2)(x+8)"}, {"id": 193, "savol": "Funksiyaning hosilasini toping: y = -3x⁴ + 1/x² - 2 cos x", "javob": "y' = -12x³ - 2/x³ + 2 sin x", "qisqa": "Yig'indi hosila qoidasi", "qadamlar": ["(-3x⁴)' = -12x³", "(1/x²)' = (x⁻²)' = -2x⁻³ = -2/x³", "(-2 cos x)' = -2·(-sin x) = 2 sin x", "y' = -12x³ - 2/x³ + 2 sin x"], "maslahat": "(1/x²) = x⁻² → hosila: -2x⁻³ = -2/x³"}, {"id": 194, "savol": "Limitni hisoblang: lim(x→-7) (x²+6x-7)/(x²+10x+21)", "javob": "-4/3", "qisqa": "0/0 — omillarga ajratish", "qadamlar": ["x=-7: surat: 49-42-7=0, maxraj: 49-70+21=0 → 0/0", "Surat: x²+6x-7 = (x+7)(x-1)", "Maxraj: x²+10x+21 = (x+7)(x+3)", "Qisqartirish: (x-1)/(x+3)", "x=-7: (-7-1)/(-7+3) = -8/(-4) = 2"], "maslahat": "(x+7) umumiy omil"}, {"id": 195, "savol": "Funksiyaning o'sish, kamayish oraliqlarini va ekstremum nuqtalarini toping: y = (1/3)x³ + 5x² + 9x + 1", "javob": "Max: x=-9, Min: x=-1", "qisqa": "Hosila orqali ekstremum", "qadamlar": ["y' = x² + 10x + 9", "y' = 0: (x+1)(x+9) = 0 → x=-1, x=-9", "x < -9: y' > 0 (o'sish)", "-9 < x < -1: y' < 0 (kamayish)", "x > -1: y' > 0 (o'sish)", "x=-9 maksimum, x=-1 minimum"], "maslahat": "(1/3)x³→x², 5x²→10x, 9x→9"}, {"id": 196, "savol": "Funksiyaning uzilish nuqtalarini toping: f(x) = (5x+2)/(x²+11x+28)", "javob": "x=-4 va x=-7", "qisqa": "Maxraj = 0 nuqtalar", "qadamlar": ["Maxraj: x²+11x+28 = 0", "D = 121-112 = 9, √D = 3", "x = (-11±3)/2 → x₁=-4, x₂=-7", "x=-4 da surat: -20+2=-18 ≠ 0", "x=-7 da surat: -35+2=-33 ≠ 0"], "maslahat": "x²+11x+28 = (x+4)(x+7)"}, {"id": 197, "savol": "Funksiyaning hosilasini toping: y = 5 sin 4x", "javob": "y' = 20 cos 4x", "qisqa": "Murakkab sinus hosila", "qadamlar": ["y = 5·sin(u), u = 4x", "(sin u)' = cos u, u' = 4", "y' = 5·cos(4x)·4 = 20 cos 4x"], "maslahat": "(sin ax)' = a·cos ax"}, {"id": 198, "savol": "Funksiyaning o'sish, kamayish oraliqlarini va ekstremum nuqtalarini toping: y = (1/3)x³ + 3x² + 8x - 20", "javob": "Max: x=-4, Min: x=-2", "qisqa": "Hosila orqali ekstremum", "qadamlar": ["y' = x² + 6x + 8", "y' = 0: (x+2)(x+4) = 0 → x=-2, x=-4", "x < -4: y' > 0 (o'sish)", "-4 < x < -2: y' < 0 (kamayish)", "x > -2: y' > 0 (o'sish)", "x=-4 maksimum, x=-2 minimum"], "maslahat": "x²+6x+8 = (x+2)(x+4)"}, {"id": 199, "savol": "Limitni hisoblang: lim(x→-3) (x²-4x-21)/(x²+2x-3)", "javob": "5/2", "qisqa": "0/0 — omillarga ajratish", "qadamlar": ["x=-3: surat: 9+12-21=0, maxraj: 9-6-3=0 → 0/0", "Surat: x²-4x-21 = (x+3)(x-7)", "Maxraj: x²+2x-3 = (x+3)(x-1)", "Qisqartirish: (x-7)/(x-1)", "x=-3: (-3-7)/(-3-1) = -10/(-4) = 5/2"], "maslahat": "(x+3) umumiy omil"}, {"id": 200, "savol": "A⊂E yozuv nimani anglatadi?", "javob": "A to'plami E ning kichik to'plami ekanligini", "qisqa": "Kichik to'plam ta'rifi", "qadamlar": ["A⊂E ma'nosi: A ning har bir elementi E da ham bor", "Har x∈A uchun x∈E bo'lsa, A⊂E", "Misol: A={1,2}, E={1,2,3} → A⊂E ✓", "A=E bo'lsa: A⊆E (keng ma'no), A⊂E (tor ma'no)", "Bo'sh to'plam: ∅⊂E — har qanday E uchun"], "maslahat": "A⊂E: A ning barcha elementi E da; E A ni o'z ichiga oladi"}, {"id": 201, "savol": "Funksiyaning uzilish nuqtalarini toping: f(x) = (3x+11)/(x²-6x-16)", "javob": "x=8 va x=-2", "qisqa": "Maxraj = 0 nuqtalar", "qadamlar": ["Maxraj: x²-6x-16 = 0", "D = 36+64 = 100, √D = 10", "x = (6±10)/2 → x₁=8, x₂=-2", "x=8 da surat: 24+11=35 ≠ 0", "x=-2 da surat: -6+11=5 ≠ 0"], "maslahat": "x²-6x-16 = (x-8)(x+2)"}, {"id": 202, "savol": "Funksiyaning hosilasini toping: y = -5x⁴ + 6/x + 2 tg x", "javob": "y' = -20x³ - 6/x² + 2/cos²x", "qisqa": "Yig'indi hosila qoidasi", "qadamlar": ["(-5x⁴)' = -20x³", "(6/x)' = (6x⁻¹)' = -6x⁻² = -6/x²", "(2 tg x)' = 2/cos²x", "y' = -20x³ - 6/x² + 2/cos²x"], "maslahat": "(6/x)' = -6/x² — manfiy belgini unutmang"}, {"id": 203, "savol": "Limitni hisoblang: lim(x→1) (x²+2x-3)/(x²+4x-5)", "javob": "2/3", "qisqa": "0/0 — omillarga ajratish", "qadamlar": ["x=1: surat: 1+2-3=0, maxraj: 1+4-5=0 → 0/0", "Surat: x²+2x-3 = (x-1)(x+3)", "Maxraj: x²+4x-5 = (x-1)(x+5)", "Qisqartirish: (x+3)/(x+5)", "x=1: (1+3)/(1+5) = 4/6 = 2/3"], "maslahat": "(x-1) umumiy omil"}, {"id": 204, "savol": "Funksiyaning o'sish, kamayish oraliqlarini va ekstremum nuqtalarini toping: y = -(1/3)x³ + 5x² - 16x + 10", "javob": "Min: x=2, Max: x=8", "qisqa": "Hosila orqali ekstremum", "qadamlar": ["y' = -x² + 10x - 16", "y' = 0: x² - 10x + 16 = 0", "(x-2)(x-8) = 0 → x=2, x=8", "x < 2: y' < 0 (kamayish)", "2 < x < 8: y' > 0 (o'sish)", "x > 8: y' < 0 (kamayish)", "x=2 minimum, x=8 maksimum"], "maslahat": "-(1/3)x³→-x², 5x²→10x, -16x→-16"}, {"id": 205, "savol": "Qanday to'plamga A va B to'plamlarning birlashmasi deb ataladi?", "javob": "A∪B = {x | x∈A yoki x∈B}", "qisqa": "Birlashtirma ta'rifi", "qadamlar": ["A∪B — A da YOKI B da (yoki ikkalasida) bo'lgan elementlar", "Shart: x∈A YOKI x∈B (kamida birida)", "Misol: A={1,2,3}, B={3,4,5} → A∪B={1,2,3,4,5}", "A∪∅ = A, A∪A = A", "A∪B = B∪A (kommutativ)"], "maslahat": "Birlashtirma: ikkala to'plamdagi barcha elementlar (takrorsiz)"}, {"id": 206, "savol": "Ushbu funksiyaning aniqlanish sohasini toping: y = 1/√(3x+15)", "javob": "x > -5", "qisqa": "Maxradda ildiz — qat'iy musbat", "qadamlar": ["3x+15 > 0", "3x > -15", "x > -5", "Aniqlanish sohasi: (-5, +∞)"], "maslahat": "Maxradda 1/√: qat'iy musbat > 0"}, {"id": 207, "savol": "y=f(x) funksiyaning x nuqtadagi hosilasining formulalardagi ta'rifini ko'rsating", "javob": "f'(x) = lim(Δx→0) [f(x+Δx)-f(x)]/Δx", "qisqa": "Hosila ta'rifi", "qadamlar": ["1. Δy = f(x+Δx) - f(x) — funksiya orttirmasi", "2. Δy/Δx — o'rtacha o'zgarish tezligi", "3. f'(x) = lim(Δx→0) Δy/Δx — momentli o'zgarish", "Geometrik: urinma burchagi tg α = f'(x)", "Fizik: momentli tezlik v = s'(t)"], "maslahat": "Hosila = limitdagi nisbiy orttirma"}, {"id": 208, "savol": "Funksiyaning o'sish, kamayish oraliqlarini va ekstremum nuqtalarini toping: y = (1/3)x³ + 4x² + 15x + 11", "javob": "Max: x=-5, Min: x=-3", "qisqa": "Hosila orqali ekstremum", "qadamlar": ["y' = x² + 8x + 15", "y' = 0: (x+3)(x+5) = 0 → x=-3, x=-5", "x < -5: y' > 0 (o'sish)", "-5 < x < -3: y' < 0 (kamayish)", "x > -3: y' > 0 (o'sish)", "x=-5 maksimum, x=-3 minimum"], "maslahat": "x²+8x+15 = (x+3)(x+5)"}, {"id": 209, "savol": "Funksiyaning qavariqlik va botiqlik oraliqlarini toping: y = -x³ + 3x² - 7x + 5", "javob": "Botiq: x < 1, Qavariq: x > 1", "qisqa": "Ikkinchi hosila", "qadamlar": ["y' = -3x² + 6x - 7", "y'' = -6x + 6", "y'' = 0: x = 1", "x < 1: y'' > 0 → botiq", "x > 1: y'' < 0 → qavariq"], "maslahat": "y'' = -6x + 6 = 0 → x = 1"}, {"id": 210, "savol": "D to'plamda aniqlangan y=f(x) funksiya qachon davriy deyiladi?", "javob": "f(x+T) = f(x) bo'lgan T > 0 mavjud bo'lsa", "qisqa": "Davriy funksiya ta'rifi", "qadamlar": ["Shunday T > 0 son mavjud bo'lishi kerak", "Barcha x∈D uchun f(x+T) = f(x)", "T — davr (period) deyiladi", "Misol: sin x davri T = 2π", "Misol: cos x davri T = 2π, tg x davri T = π", "Misol: sin(2x) davri T = π"], "maslahat": "sin va cos uchun T=2π, tg va ctg uchun T=π"}, {"id": 211, "savol": "Funksiyaning qavariqlik va botiqlik oraliqlarini toping: y = x³ - 6x² + 5x + 1", "javob": "Qavariq: x < 2, Botiq: x > 2", "qisqa": "Ikkinchi hosila", "qadamlar": ["y' = 3x² - 12x + 5", "y'' = 6x - 12", "y'' = 0: x = 2", "x < 2: y'' < 0 → qavariq", "x > 2: y'' > 0 → botiq"], "maslahat": "y'' = 6x - 12 = 0 → x = 2"}, {"id": 212, "savol": "Limitni hisoblang: lim(x→-5) (x²-7x+10)/(x²-2x-15)", "javob": "9/8", "qisqa": "0/0 — omillarga ajratish", "qadamlar": ["x=-5: surat: 25+35+10=70≠0", "Surat(-5)=25+35+10=70, maxraj(-5)=25+10-15=20", "Noaniqlik yo'q: 70/20 = 7/2", "Agar boshqa x uchun: omillarga ajrating"], "maslahat": "Avval x ni qo'yib tekshiring"}, {"id": 213, "savol": "x∈E yozuv nimani anglatadi?", "javob": "x elementi E to'plamga tegishli ekanligini", "qisqa": "Elementning tegishliligi", "qadamlar": ["x∈E — x elementi E to'plamga kiradi", "x∉E — x elementi E to'plamga kirmaydi", "Misol: 2∈{1,2,3} ✓", "Misol: 5∉{1,2,3} ✓", "To'plamni belgilash: {x | x shartni qanoatlantiradi}"], "maslahat": "∈ = tegishli, ∉ = tegishli emas"}, {"id": 214, "savol": "Funksiyaning hosilasini toping: y = x ln x", "javob": "y' = ln x + 1", "qisqa": "Ko'paytma hosila qoidasi", "qadamlar": ["(u·v)' = u'v + uv'", "u = x → u' = 1", "v = ln x → v' = 1/x", "y' = 1·ln x + x·(1/x)", "y' = ln x + 1"], "maslahat": "x·(1/x) = 1 — qisqaradi"}, {"id": 215, "savol": "Funksiyaning qavariqlik va botiqlik oraliqlarini toping: y = x³ - 9x² - 7x + 3", "javob": "Qavariq: x < 3, Botiq: x > 3", "qisqa": "Ikkinchi hosila", "qadamlar": ["y' = 3x² - 18x - 7", "y'' = 6x - 18", "y'' = 0: x = 3", "x < 3: y'' < 0 → qavariq", "x > 3: y'' > 0 → botiq"], "maslahat": "y'' = 6x - 18 = 0 → x = 3"}, {"id": 216, "savol": "Ushbu funksiyaning aniqlanish sohasini toping: y = √(3x-21)", "javob": "x ≥ 7", "qisqa": "Juft ildiz — ichida ≥ 0", "qadamlar": ["√ uchun: 3x-21 ≥ 0", "3x ≥ 21", "x ≥ 7", "Aniqlanish sohasi: [7, +∞)"], "maslahat": "√ (juft daraja): ichida ≥ 0 (tenglik ham mumkin)"}, {"id": 217, "savol": "Funksiyalar qanday usullar bilan beriladi?", "javob": "Analitik (formula), jadval, grafik va og'zaki usullar", "qisqa": "Funksiyani berish usullari", "qadamlar": ["1. Analitik: y = f(x) formula bilan (y=x², y=sin x)", "2. Jadval: x va y qiymatlari jadvali", "3. Grafik: koordinata tekisligida egri chiziq", "4. Og'zaki (tavsifiy): so'z bilan ifodalash", "Amalda ko'p analitik usul ishlatiladi"], "maslahat": "4 usul: formula, jadval, grafik, og'zaki"}, {"id": 218, "savol": "Funksiyaning qavariqlik va botiqlik oraliqlarini toping: y = -x³ + 9x² + 5x + 4", "javob": "Botiq: x < 3, Qavariq: x > 3", "qisqa": "Ikkinchi hosila", "qadamlar": ["y' = -3x² + 18x + 5", "y'' = -6x + 18", "y'' = 0: x = 3", "x < 3: y'' > 0 → botiq", "x > 3: y'' < 0 → qavariq"], "maslahat": "y'' = -6x + 18 = 0 → x = 3"}, {"id": 219, "savol": "Qachon A to'plam B to'plamning qism to'plami deyiladi?", "javob": "A⊆B: A ning har bir elementi B da bo'lsa", "qisqa": "Kichik to'plam ta'rifi", "qadamlar": ["A⊆B sharti: har x∈A uchun x∈B", "Ya'ni: A da bo'lgan hamma B d const C={"limit": [1, 7, 10, 11, 24, 25, 40, 41, 42, 63, 65, 66, 68, 72, 95, 123, 130, 153, 162, 164, 166, 168, 170, 172, 174, 187, 194, 199, 203, 212, 220, 222, 228, 232, 240], "integral": [2, 3, 54, 87, 92, 115, 116, 117, 119, 120, 124, 126, 129, 131, 132, 135, 140, 142, 175, 179, 224], "hosila": [5, 15, 33, 45, 46, 47, 49, 50, 51, 52, 55, 59, 69, 73, 74, 75, 76, 78, 79, 81, 83, 85, 86, 88, 89, 91, 93, 94, 96, 98, 99, 101, 103, 104, 105, 108, 109, 110, 111, 114, 121, 125, 133, 136, 145, 147, 151, 155, 163, 173, 185, 193, 197, 202, 207, 214, 226, 233, 239], "funksiya": [4, 8, 13, 14, 17, 19, 22, 26, 27, 28, 31, 32, 34, 35, 39, 43, 44, 48, 53, 56, 57, 58, 60, 61, 62, 64, 67, 77, 80, 82, 97, 100, 102, 113, 118, 122, 127, 134, 144, 149, 150, 152, 154, 156, 158, 159, 160, 161, 165, 167, 169, 171, 177, 178, 181, 183, 189, 191, 195, 198, 204, 208, 209, 210, 211, 215, 217, 218, 225, 227, 230, 234, 235, 236, 237], "aniqlanish": [6, 9, 16, 21, 29, 71, 106, 128, 157, 176, 180, 182, 184, 186, 188, 190, 206, 216, 221], "toplam": [18, 20, 23, 70, 90, 138, 200, 205, 213, 219], "ketma": [37, 38, 84, 223]};
const CL={limit:'Limitlar',integral:'Integrallar',hosila:'Hosilalar',funksiya:'Funksiyalar',toplam:"To'plamlar",ketma:'Ketma-ketlik',aniqlanish:'Aniqlanish sohalari'};
const CC={limit:'#2ea6ff',integral:'#ff9f0a',hosila:'#a78bfa',funksiya:'#4cd964',toplam:'#ff6b9d',ketma:'#ffd60a',aniqlanish:'#30d158'};
let cf='all',op=new Set(),lt=false;
try{const tg=window.Telegram&&window.Telegram.WebApp;if(tg){tg.expand();if(tg.colorScheme==='light'){lt=true;document.body.classList.add('light');document.getElementById('thb').textContent='🌙';}}}catch(e){}
try{if(localStorage.getItem('_lt')==='1'){lt=true;document.body.classList.add('light');document.getElementById('thb').textContent='🌙';}}catch(e){}
function th(){lt=!lt;document.body.classList.toggle('light',lt);document.getElementById('thb').textContent=lt?'🌙':'☀️';try{localStorage.setItem('_lt',lt?'1':'0');}catch(e){}}
function gc(id){for(const[c,ids]of Object.entries(C))if(ids.includes(id))return c;return 'funksiya';}
function sf(f,b){cf=f;document.querySelectorAll('.fc').forEach(x=>x.classList.remove('on'));b.classList.add('on');go();}
function e(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function go(){
  const q=(document.getElementById('sb').value||'').toLowerCase().trim();
  const l=Q.filter(i=>{
    if(cf!=='all'&&(!C[cf]||!C[cf].includes(i.id)))return false;
    if(!q)return true;
    return i.savol.toLowerCase().includes(q)||i.javob.toLowerCase().includes(q)||i.qisqa.toLowerCase().includes(q)||i.qadamlar.some(s=>s.toLowerCase().includes(q));
  });
  rnd(l);
}
function rnd(l){
  const el=document.getElementById('ql'),em=document.getElementById('em');
  document.getElementById('sS').textContent=l.length;
  if(!l.length){el.innerHTML='';em.classList.add('show');return;}
  em.classList.remove('show');
  let h='',lc=null;
  l.forEach(q=>{
    const c=gc(q.id);
    if(cf==='all'&&c!==lc){h+='<div class="cdiv">'+(CL[c]||c)+'</div>';lc=c;}
    const col=CC[c]||'#2ea6ff';
    const io=op.has(q.id);
    const st=q.qadamlar.map((s,i)=>'<div class="step"><div class="snum2">'+(i+1)+'</div><div class="stxt">'+e(s)+'</div></div>').join('');
    h+='<div class="qc'+(io?' open':'')+'" id="q'+q.id+'">'
      +'<div class="qh" onclick="tq('+q.id+')">'
      +'<div class="qnum">'+q.id+'</div>'
      +'<div class="qb"><div class="qcat" style="color:'+col+'">'+e(CL[c]||'')+'</div>'
      +'<div class="qtxt">'+e(q.savol)+'</div>'
      +'<div class="qar"><div class="ab">✓ '+e(q.javob)+'</div><div class="qs">'+e(q.qisqa)+'</div></div>'
      +'</div><div class="qa">▾</div></div>'
      +'<div class="qe"><div class="ei">'
      +'<div class="et">Qadam-baqadam yechim</div>'
      +'<div class="steps">'+st+'</div>'
      +'<div class="tip"><div class="tip-i">💡</div><div class="tip-t">'+e(q.maslahat)+'</div></div>'
      +'</div></div></div>';
  });
  el.innerHTML=h;
}
function tq(id){
  const c=document.getElementById('q'+id);if(!c)return;
  const o=c.classList.contains('open');
  if(o){c.classList.remove('open');op.delete(id);}
  else{c.classList.add('open');op.add(id);setTimeout(function(){c.scrollIntoView({behavior:'smooth',block:'nearest'});},50);}
  document.getElementById('sO').textContent=op.size;
}
rnd(Q);
</script>
